name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  backend-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend-dotnet/Restaurant.slnx

      - name: Build
        run: dotnet build backend-dotnet/Restaurant.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test backend-dotnet/Restaurant.slnx -c Release --no-build --verbosity normal
        continue-on-error: true

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [frontend, backend-dotnet]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Copy Docker configuration to VPS
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || '2022' }} \
            ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /root/restaurant-clean/backend-dotnet"

          sshpass -e scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || '2022' }} \
            docker-compose.yml \
            ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }}:/root/restaurant-clean/docker-compose.yml

          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || '2022' }}" \
            backend-dotnet/ \
            ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }}:/root/restaurant-clean/backend-dotnet/

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || '2022' }} \
            ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /root/restaurant-clean

            echo "=== Backing up database ==="
            docker exec restaurant-db pg_dump -U restaurant restaurant > /root/restaurant_backup_$(date +%Y%m%d_%H%M%S).sql
            echo "DB backup created"

            echo "=== Stopping old Python containers ==="
            docker compose stop backend celery-worker celery-beat 2>/dev/null || true
            docker compose rm -f backend celery-worker celery-beat 2>/dev/null || true

            echo "=== Building and starting .NET backend ==="
            docker compose up -d --build backend-dotnet

            echo "=== Waiting for .NET backend to be ready ==="
            for i in $(seq 1 30); do
              if curl -s http://localhost:8080/health > /dev/null 2>&1; then
                echo ".NET backend is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            echo "=== Verifying deployment ==="
            curl -s -o /dev/null -w "Health endpoint HTTP status: %{http_code}\n" http://localhost:8080/health
            echo "Response body:"
            curl -s http://localhost:8080/health

            echo "=== Recent container logs ==="
            docker compose logs --tail=20 backend-dotnet

            echo "=== Deployment complete ==="
EOF
