name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  backend-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend-dotnet/Restaurant.slnx

      - name: Build
        run: dotnet build backend-dotnet/Restaurant.slnx -c Release --no-restore

      - name: Run tests (if any exist)
        run: |
          if find backend-dotnet -name '*.Tests*.csproj' -maxdepth 2 | grep -q .; then
            dotnet test backend-dotnet/Restaurant.slnx -c Release --no-build --verbosity normal
          else
            echo "No test projects found, skipping tests"
          fi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [frontend, backend-dotnet]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy via SSH (git pull + docker compose)
        run: |
          ssh -o StrictHostKeyChecking=no -p 2022 \
            root@31.3.218.196 bash -c '
            set -e
            cd /root/restaurant-clean
            echo "=== Pulling latest code ==="
            git fetch origin
            git reset --hard origin/main
            echo "=== Backing up database ==="
            docker exec restaurant-db pg_dump -U restaurant restaurant_dotnet > /root/restaurant_backup_$(date +%Y%m%d_%H%M%S).sql || echo "DB backup skipped (db may be down)"
            echo "=== Building and starting .NET backend ==="
            docker compose up -d --build backend-dotnet
            echo "=== Waiting for .NET backend to be ready ==="
            for i in $(seq 1 30); do
              if curl -s http://localhost:8082/health > /dev/null 2>&1; then
                echo ".NET backend is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done
            echo "=== Verifying deployment ==="
            curl -s -o /dev/null -w "Health endpoint HTTP status: %{http_code}\n" http://localhost:8082/health
            curl -s http://localhost:8082/health
            echo "=== Recent container logs ==="
            docker compose logs --tail=20 backend-dotnet
            echo "=== Deployment complete ==="
          '
