services:
  postgres:
    image: postgres:16
    container_name: restaurant-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: restaurant
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurant"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restaurant-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-dotnet:
    build:
      context: ./backend-dotnet
      dockerfile: Dockerfile
    container_name: restaurant-backend-dotnet
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8000"
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=restaurant_dotnet;Username=restaurant;Password=restaurant_dev
      Jwt__SecretKey: super-secret-key-change-in-production-at-least-32-characters!!
      Jwt__Issuer: restaurant-api
      Jwt__Audience: restaurant-app
      Jwt__AccessTokenExpireMinutes: 15
      Jwt__RefreshTokenExpireDays: 7
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  menu_images:
